    background-size: cover; background-position: center top; z-index: 0;
    animation: bgReveal 1.2s ease-out forwards;
  }
  @keyframes bgReveal {
    from { opacity: 0; transform: scale(1.04); }
    to   { opacity: 1; transform: scale(1); }
  }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(14,10,6,0.00) 0%,
      rgba(14,10,6,0.00) 48%,
      rgba(14,10,6,0.45) 65%,
      rgba(14,10,6,0.82) 80%,
      rgba(14,10,6,0.95) 100%
    );
    z-index: 1;
  }
  .header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 52px 28px 16px;
    display: flex; align-items: center; justify-content: flex-end;
    z-index: 10; animation: fadeDown 0.8s ease-out 0.3s both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-icon {
    width: 48px; height: 48px; border-radius: 14px;
    object-fit: cover; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .content {
    position: relative; z-index: 10;
    padding: 0 28px 48px;
    display: flex; flex-direction: column;
  }
  .headline {
    font-family: 'DM Serif Display', serif; font-weight: 800;
    font-size: clamp(24px, 6.5vw, 32px); line-height: 1.12;
    color: var(--white); margin-bottom: 18px;
    animation: fadeUp 0.9s ease-out 0.5s both;
  }
  .headline .accent { color: var(--terracota-light); display: block; font-size: 0.72em; }
  .headline .mid { font-size: 0.72em; opacity: 0.85; }
  .subtitle {
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    font-size: 14px; line-height: 1.6;
    color: rgba(255,255,255,0.72); margin-bottom: 36px;
    animation: fadeUp 0.9s ease-out 0.65s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .dots {
    display: flex; gap: 8px; margin-bottom: 28px;
    animation: fadeUp 0.9s ease-out 0.75s both;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--terracota); }
  .dot.inactive { background: rgba(255,255,255,0.25); }
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 18px 24px;
    background: var(--terracota); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-weight: 400;
    font-size: 17px; letter-spacing: 0.04em;
    border: none; border-radius: 16px; cursor: pointer;
    text-decoration: none;
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 28px rgba(201,83,42,0.45);
    margin-bottom: 20px;
    animation: fadeUp 0.9s ease-out 0.85s both;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active {
    background: var(--terracota-dark); transform: scale(0.97);
    box-shadow: 0 4px 14px rgba(201,83,42,0.3);
  }
  .link-secondary {
    display: block; text-align: center;
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    font-size: 14px; color: rgba(255,255,255,0.65);
    text-decoration: underline; text-underline-offset: 3px;
    cursor: pointer; letter-spacing: 0.02em;
    animation: fadeUp 0.9s ease-out 0.95s both;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s ease;
    border: none; background: none; width: 100%;
  }
  .link-secondary:active { color: rgba(255,255,255,0.9); }
  .home-indicator {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: rgba(255,255,255,0.3); border-radius: 3px; z-index: 10;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="bg"></div>
